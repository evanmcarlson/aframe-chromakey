<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>aframe chromakey</title>
  <meta itemprop="name" content="aframe chromakey">
  <meta name="twitter:title" content="aframe chromakey">
  <meta property="og:title" content="aframe chromakey">
  <meta property="og:site_name" content="aframe chromakey">
  <meta name="description" content="">
  <meta itemprop="description" content="">
  <meta property="og:description" content="">
  <meta name="twitter:description" content="">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  </script>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<script src="//cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js" crossorigin="anonymous"></script>

</head>

<body>
<script src="bundle.js"></script>

<a-scene
  xrextras-tap-recenter
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  xrweb="allowedDevices: any">
  <a-assets>
    <video id="alpha-video" src="./assets/alpaca.mp4" muted loop></video>
  </a-assets>

  <a-entity
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-camera position="0 2 2"></a-camera>

  <a-plane
    width="1.78"
    position="0 0.915 0"
    scale="3 3 3"
    chromakey-video="src: #alpha-video"></a-plane>

  <a-plane
    height="2000"
    width="2000"
    rotation="-90 0 0"
    material="shader: shadow; opacity: 0.67"
    shadow>
  </a-plane>
</a-scene>

</body>

</html>
